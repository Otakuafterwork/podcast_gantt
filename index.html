document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  }\n  .eyebrow::before{content:\"\";width:8px;height:8px;border-radius:50%;background:var(--c-rec);\n    animation:blink 1.6s ease-in-out infinite}\n  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}\n  @media (prefers-reduced-motion:reduce){.eyebrow::before{animation:none}}\n  h1{font-size:clamp(20px,4vw,30px);font-weight:900;letter-spacing:.02em}\n  h1 small{display:block;font-size:12.5px;font-weight:400;color:var(--ink-dim);margin-top:6px;letter-spacing:.06em}\n  .alertbadge{margin-left:auto;display:none;background:var(--c-rec);color:#fff;font-weight:800;\n    font-size:13px;border:2px solid var(--line);border-radius:999px;padding:9px 16px;\n    text-decoration:none;box-shadow:3px 3px 0 rgba(43,43,43,.25)}\n  .alertbadge.show{display:inline-block}\n\n  .banner{max-width:1220px;margin:0 auto 12px;border:2px solid var(--c-edit);\n    background:#FFF3DC;color:#8a5a00;border-radius:12px;\n    padding:10px 14px;font-size:12.5px;display:none;line-height:1.7}\n  .banner.show{display:block}\n  .banner code{background:rgba(240,140,0,.14);padding:1px 6px;border-radius:4px;\n    font-family:ui-monospace,Menlo,monospace;font-size:11.5px}\n\n  /* ── 未準時完成（頁面最底）── */\n  .alertbox{max-width:1220px;margin:18px auto 0;border:2px solid var(--c-rec);\n    background:#FFECEC;color:var(--ink);border-radius:14px;\n    padding:14px 16px;font-size:12.5px;display:none;line-height:1.9;\n    box-shadow:4px 4px 0 rgba(229,72,77,.2)}\n  .alertbox.show{display:block}\n  .alertbox > b{color:var(--c-rec);display:block;margin-bottom:6px;font-size:14px}\n  .alertbox .aitem b{color:var(--c-rec)}\n  .alertbox.past{border-color:#9AA3B2;background:#F3F1E7;box-shadow:none;color:#6b6146}\n  .alertbox.past > b{color:#6b6146}\n  .alertbox.past .aitem b{color:#8a5a5a}\n  .donedate{color:var(--c-sched);font-weight:800;font-size:10.5px;margin-left:5px;white-space:nowrap}\n  .todo.donefix{cursor:default}\n  .todo.donefix input{cursor:default}\n\n  /* ── 接下來播出 ── */\n  .nextup{max-width:1220px;margin:0 auto 14px;background:var(--brand);\n    border:2px solid var(--line);border-radius:16px;padding:20px 22px;\n    display:flex;flex-wrap:wrap;align-items:center;gap:14px;\n    position:relative;overflow:hidden;box-shadow:5px 5px 0 rgba(43,43,43,.18)}\n  .nextup::after{content:\"\";position:absolute;right:2px;bottom:-18px;width:150px;height:150px;\n    background:url(\"ef20e23e-3861-47fe-988e-06c243ed07a0\") no-repeat center/contain;pointer-events:none}\n  .nextup .big{flex:1;min-width:240px;position:relative;z-index:1}\n  @media (min-width:640px){ .nextup .big{padding-right:130px} }\n  @media (max-width:639px){ .nextup::after{opacity:.25} }\n  .nextup .kicker{font-size:11px;letter-spacing:.2em;color:var(--ink);font-weight:800;margin-bottom:6px}\n  .nextup .title{font-size:clamp(17px,3vw,24px);font-weight:900;line-height:1.4}\n  .nextup .meta{font-size:12.5px;color:#5c5230;margin-top:6px;font-weight:600}\n  .nextup .after{font-size:13px;color:var(--ink);border-left:2px solid rgba(43,43,43,.35);\n    padding-left:14px;line-height:2;min-width:200px;position:relative;z-index:1;font-weight:600}\n  .nextup .after b{color:var(--ink)}\n  .nextup .after .kick{font-size:11px;letter-spacing:.18em;font-weight:800;color:#5c5230}\n  .nextup .after .work{font-size:15px;font-weight:900;color:var(--ink);\n    background:#fff;border:2px solid var(--line);border-radius:6px;padding:0 7px;\n    display:inline-block;line-height:1.7;margin:2px 0;box-shadow:2px 2px 0 rgba(43,43,43,.15)}\n  .countdown{background:#fff;color:var(--c-rec);font-weight:900;font-size:16px;\n    padding:10px 18px;border-radius:12px;white-space:nowrap;border:2px solid var(--line);\n    box-shadow:3px 3px 0 rgba(43,43,43,.2);position:relative;z-index:1;letter-spacing:.04em}\n  .countdown small{display:block;font-size:10px;color:var(--ink-dim);font-weight:700;letter-spacing:.1em}\n\n  /* ── 四人看板 ── */\n  .crewsec{max-width:1220px;margin:0 auto 14px}\n  .crewsec h2{font-size:17px;font-weight:900;margin-bottom:10px;display:flex;align-items:center}\n  .crewsec h2::before{content:\"\";display:inline-block;width:32px;height:32px;flex:none;\n    background:url(\"7d11e7aa-2181-4e7c-9c8b-fbc312284b62\") center/contain no-repeat;margin-right:8px}\n  .crewsec h2 span{font-size:12px;color:var(--ink-dim);font-weight:400;margin-left:8px}\n  .crew{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}\n  .person{background:var(--panel);border:2px solid var(--line);border-radius:14px;\n    padding:14px;border-top-width:6px;box-shadow:4px 4px 0 rgba(43,43,43,.12)}\n  .person h3{font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px}\n  .person h3 .pd{width:12px;height:12px;border-radius:50%;flex:none;border:2px solid var(--line)}\n  .person .role{font-size:11px;color:var(--ink-dim);margin:4px 0 10px;line-height:1.6}\n  .person .none{font-size:12.5px;color:var(--ink-dim);padding:4px 0}\n  .stagechip{display:inline-block;font-size:10px;font-weight:800;border-radius:4px;\n    padding:1px 6px;margin-right:6px;color:#fff;vertical-align:1px}\n  .sup{font-size:11px;color:var(--c-rec);margin-top:10px;padding-top:8px;\n    border-top:2px dashed var(--soft);letter-spacing:.08em;font-weight:800}\n  .lateitem{font-size:12px;line-height:1.6;color:var(--ink);background:#FFECEC;\n    border:1.5px solid var(--c-rec);border-radius:8px;padding:6px 9px;margin:0 0 7px}\n  .lateitem b{color:var(--c-rec)}\n\n  /* ── 職責範圍 ── */\n  .respsec{max-width:1220px;margin:0 auto 14px;background:var(--panel-2);\n    border:2px solid var(--line);border-radius:14px;padding:14px 16px;\n    box-shadow:4px 4px 0 rgba(43,43,43,.1)}\n  .respsec h2{font-size:14px;font-weight:900;margin-bottom:8px}\n  .resp{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px;font-size:12px}\n  .resp div{display:flex;gap:8px;align-items:flex-start;color:#6b6146;line-height:1.6}\n  .resp .pd{width:11px;height:11px;border-radius:50%;flex:none;margin-top:4px;border:2px solid var(--line)}\n  .resp b{color:var(--ink)}\n\n  .pipeline{max-width:1220px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:8px;font-size:12px}\n  .step{display:flex;align-items:center;gap:7px;background:var(--panel);\n    border:2px solid var(--line);border-radius:10px;padding:6px 10px;color:var(--ink-dim)}\n  .step b{color:var(--ink);font-weight:700}\n  .dot{width:10px;height:10px;border-radius:3px;flex:none}\n  .dot.stock{background:transparent;border:2px dashed var(--c-stock)}\n\n  .board{max-width:1220px;margin:12px auto 0;background:var(--panel);\n    border:2px solid var(--line);border-radius:16px;overflow:hidden;\n    box-shadow:5px 5px 0 rgba(43,43,43,.12)}\n  .board-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;\n    padding:14px 16px 10px;border-bottom:2px solid var(--soft)}\n  .board-head h2{font-size:15px;font-weight:900;display:flex;align-items:center}\n  .board-head h2::before{content:\"\";display:inline-block;width:28px;height:28px;flex:none;\n    background:url(\"0842c224-6939-402f-b364-31d0f98fc433\") center/contain no-repeat;margin-right:8px}\n  .board-head .hint{font-size:12px;color:var(--ink-dim)}\n  .weeknav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}\n  .weeknav button{\n    background:#fff;border:2px solid var(--line);color:var(--ink);\n    border-radius:10px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;\n    box-shadow:2px 2px 0 rgba(43,43,43,.2)}\n  .weeknav button:hover{background:var(--brand)}\n  .weeknav button:disabled{opacity:.35;cursor:default;box-shadow:none}\n  .weeknav .cur{font-size:13px;font-weight:800;color:var(--now);min-width:110px;text-align:center}\n  .scroll{overflow-x:auto;padding:20px 16px 18px}\n\n  .gantt{display:grid;grid-auto-rows:54px;row-gap:4px;position:relative}\n  .wk{grid-row:1;align-self:center;justify-self:center;font-size:10px;color:var(--ink-dim);\n    text-align:center;line-height:1.3;cursor:pointer;border-radius:6px;padding:2px r-radius:50%;\n    background:#fff;border:2px solid var(--c-rec);z-index:3;\n    display:flex;align-items:center;justify-content:center;font-size:10px;\n    box-shadow:2px 2px 0 rgba(43,43,43,.2)}\n  .recdot::after{content:\"🎙\"}\n  .recdot.late{border-color:var(--c-edit)}\n  .gridline{position:absolute;top:58px;bottom:0;width:1px;background:rgba(43,43,43,.1);pointer-events:none}\n  .soloband{position:absolute;top:58px;bottom:0;background:rgba(154,163,178,.14);\n    border-left:2px dashed var(--c-solo);border-right:2px dashed var(--c-solo);\n    pointer-events:none;z-index:1}\n  .soloband em{position:absolute;top:6px;left:50%;transform:translateX(-50%);\n    font-style:normal;font-size:10px;color:#5f6c80;white-space:nowrap;\n    letter-spacing:.15em;font-weight:800}\n  .nowline{position:absolute;top:0;bottom:0;width:2.5px;background:var(--now);\n    box-shadow:0 0 10px rgba(229,72,77,.5);pointer-events:none;z-index:5;\n    transition:left .25s ease}\n  .nowtag{position:absolute;top:-4px;transform:translateX(-50%);\n    background:var(--now);color:#fff;font-size:10px;font-weight:800;\n    padding:2px 9px;border-radius:999px;white-space:nowrap;z-index:6;\n    border:2px solid var(--line);transition:left .25s ease}\n\n  .slice{max-width:1220px;margin:14px auto 0;background:var(--panel-2);\n    border:2px solid var(--line);border-radius:16px;padding:16px;\n    box-shadow:4px 4px 0 rgba(43,43,43,.1)}\n  .slice h2{font-size:15px;font-weight:900;margin-bottom:4px;display:flex;align-items:center}\n  .slice h2::before{content:\"\";display:inline-block;width:28px;height:28px;flex:none;\n    background:url(\"5c50ecfa-033d-436c-8d09-04038222e773\") center/contain no-repeat;margin-right:8px}\n  .slice p.sub{font-size:12px;color:#6b6146;margin-bottom:12px}\n  .slice-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}\n  .task{border:2px solid var(--line);border-left-width:6px;border-radius:10px;\n    background:var(--panel);padding:10px 12px;font-size:12.5px;\n    box-shadow:3px 3px 0 rgba(43,43,43,.1)}\n  .task b{display:block;font-size:13px;font-weight:800;margin-bottom:3px}\n  .task > span{color:var(--ink-dim);display:block;font-size:11.5px}\n  .empty{color:var(--ink-dim);font-size:13px;padding:8px 2px}\n  .todo{display:flex;align-items:flex-start;gap:8px;margin-top:7px;cursor:pointer;\n    font-size:12.5px;color:var(--ink);line-height:1.5}\n  .todo input{accent-color:var(--c-sched);width:16px;height:16px;margin-top:1px;\n    flex:none;cursor:pointer}\n  .todo.checked .txt{color:var(--ink-dim);text-decoration:line-through}\n  .todo.info{cursor:default;color:var(--ink-dim)}\n  .todo .dl{font-style:normal;color:var(--c-edit);font-weight:800;display:inline-block}\n  .todo.checked .dl{opacity:.5}\n  .who{display:inline-block;font-size:10px;font-weight:800;border-radius:999px;\n    padding:1px 8px;margin-left:5px;vertical-align:1px;color:#fff}\n  .who.un{background:transparent;border:1.5px dashed var(--c-rec);color:var(--c-rec)}\n  .ebook{display:inline-block;font-size:10px;font-weight:800;border-radius:5px;\n    padding:1px 6px;margin-left:5px;background:rgba(30,158,111,.12);\n    color:var(--c-sched);border:1.5px solid rgba(30,158,111,.45);vertical-align:1px}\n  .ebook.paper{background:rgba(240,140,0,.1);color:var(--c-edit);\n    border-color:rgba(240,140,0,.45)}\n\n\n  /* ── 品牌頁尾 ── */\n  .brandfoot{max-width:1220px;margin:24px auto 0}\n  .sloganimg{display:block;width:100%;height:auto;border:2px solid var(--line);\n    border-radius:16px;box-shadow:5px 5px 0 rgba(43,43,43,.15)}\n  .footrow{display:flex;align-items:center;justify-content:center;gap:26px;\n    flex-wrap:wrap;margin-top:18px;padding:10px 0 4px}\n  .doorimg{height:120px;width:auto;border-radius:12px;border:2px solid var(--line);\n    background:#fff;box-shadow:3px 3px 0 rgba(43,43,43,.12)}\n  .footlogo{height:88px;width:auto;display:block;margin:0 auto 6px}\n  .foottext{text-align:center;font-size:12px;color:var(--ink-dim);line-height:1.7;font-weight:700}\n  .foottext span{font-size:10px;letter-spacing:.18em;font-weight:400}\n  .footzhai{height:96px;width:auto}\n  @media (max-width:560px){ .doorimg,.footzhai{height:84px} }\n\n  /* 甘特圖浮水印 */\n  .scroll{position:relative}\n  .scroll::after{content:\"\";position:absolute;right:10px;bottom:6px;width:130px;height:130px;\n    background:url(\"ef20e23e-3861-47fe-988e-06c243ed07a0\") no-repeat center/contain;opacity:.07;pointer-events:none}\n\n  /* 看板無事一身輕的小圖 */\n  .person .none::before{content:\"\";display:block;width:56px;height:56px;margin:2px 0 6px;\n    background:url(\"7d11e7aa-2181-4e7c-9c8b-fbc312284b62\") no-repeat center/contain;opacity:.5}\n\n  /* 職責範圍浮水印 */\n  .respsec{position:relative;overflow:hidden}\n  .respsec::after{content:\"\";position:absolute;right:-14px;bottom:-20px;width:110px;height:110px;\n    background:url(\"5c50ecfa-033d-436c-8d09-04038222e773\") no-repeat center/contain;opacity:.14;pointer-events:none;transform:rotate(-8deg)}\n\n  .notes{max-width:1220px;margin:16px auto 0;font-size:12.5px;color:#6b6146;line-height:1.9}\n  .notes b{color:var(--ink)}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<header>\n  <img src=\"4322521d-60f6-4170-bc45-4591eb8880bb\" class=\"brandlogo\" alt=\"宅宅下班中\">\n  <div>\n    <div class=\"eyebrow mono\">ON AIR · 每週五 11:00（台灣）<\u002Fdiv>\n    <h1>節目製作看板\n      <small>資料來源：Google Sheet｜在 Sheet 新增或修改，重新整理本頁即同步<\u002Fsmall>\n    <\u002Fh1>\n  <\u002Fdiv>\n  <a id=\"alertBadge\" href=\"#alertTop\" class=\"alertbadge\"><\u002Fa>\n<\u002Fheader>\n\n<div class=\"banner\" id=\"banner\"><\u002Fdiv>\n\n\n<!-- ① 接下來播出 -->\n<div class=\"nextup\" id=\"nextup\"><\u002Fdiv>\n\n<!-- 🚨 進行中：未準時完成（接下來播出下方） -->\n<div class=\"alertbox\" id=\"alertTop\"><\u002Fdiv>\n\n<!-- ② 四人本週看板 -->\n<div class=\"crewsec\">\n  <h2 id=\"crewTitle\">本週四人看板<\u002Fh2>\n  <div class=\"crew\" id=\"crew\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ⑤ 週次瀏覽切面 -->\n<div class=\"slice\">\n  <h2 id=\"sliceTitle\"><\u002Fh2>\n  <p class=\"sub\">紅線那一週的待辦清單 —— 勾選追蹤進度（勾勾存在你自己的裝置上）。 <span id=\"progress\" class=\"mono\" style=\"color:var(--c-sched);font-weight:700\"><\u002Fspan><\u002Fp>\n  <div class=\"slice-grid\" id=\"slice\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ③ 職責範圍 -->\n<div class=\"respsec\">\n  <h2>👥 職責範圍<\u002Fh2>\n  <div class=\"resp\">\n    <div><span class=\"pd\" style=\"background:var(--p-bugu)\"><\u002Fspan><span><b>布菇<\u002Fb>｜時間軸監督——所有 🚨 逾期、⚠ 死線、未指派項目自動歸入她的看板追蹤<\u002Fspan><\u002Fdiv>\n    <div><span class=\"pd\" style=\"background:var(--p-azhi)\"><\u002Fspan><span><b>阿植<\u002Fb>｜排程上架（依 Sheet 排程欄指派給任何人；留空預設阿植）<\u002Fspan><\u002Fdiv>\n    <div><span class=\"pd\" style=\"background:var(--p-mei)\"><\u002Fspan><span><b>大酸梅<\u002Fb>｜參與的文案與剪輯（依 Sheet 文案／剪輯欄指派）＋擔任講者的集數閱讀與錄音<\u002Fspan><\u002Fdiv>\n    <div><span class=\"pd\" style=\"background:var(--p-papa)\"><\u002Fspan><span><b>趴趴熊<\u002Fb>｜參與的文案與剪輯（依 Sheet 文案／剪輯欄指派）＋擔任講者的集數閱讀與錄音<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"pipeline\">\n  <div class=\"step\"><span class=\"dot\" style=\"background:var(--c-topic)\"><\u002Fspan><b>選題<\u002Fb>（✓=已定）<\u002Fdiv>\n  <div class=\"step\"><span class=\"dot\" style=\"background:var(--c-read)\"><\u002Fspan><b>閱讀<\u002Fb><\u002Fdiv>\n  <div class=\"step\"><span class=\"dot\" style=\"background:var(--c-rec)\"><\u002Fspan><b>錄音<\u002Fb><\u002Fdiv>\n  <div class=\"step\"><span class=\"dot\" style=\"background:var(--c-edit)\"><\u002Fspan><b>文案＋剪輯<\u002Fb><\u002Fdiv>\n  <div class=\"step\"><span class=\"dot\" style=\"background:var(--c-sched)\"><\u002Fspan><b>排程<\u002Fb><\u002Fdiv>\n  <div class=\"step\"><span style=\"width:16px;height:16px;border-radius:50%;border:2px solid var(--c-rec);display:inline-flex;align-items:center;justify-content:center;font-size:8px;flex:none\">🎙<\u002Fspan><b>錄音日已定<\u002Fb><\u002Fdiv>\n  <div class=\"step\"><span class=\"dot stock\"><\u002Fspan><b>備用庫存<\u002Fb><\u002Fdiv>\n  <div class=\"step\"><span class=\"dot\" style=\"background:var(--c-solo);border-radius:2px;transform:rotate(45deg)\"><\u002Fspan><b>個人節目<\u002Fb><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ④ 甘特圖 -->\n<div class=\"board\">\n  <div class=\"board-head\">\n    <h2 id=\"rangeTitle\">載入中…<\u002Fh2>\n    <div class=\"weeknav\">\n      <button id=\"prevBtn\">◀ 上一週<\u002Fbutton>\n      <div class=\"cur mono\" id=\"curLabel\"><\u002Fdiv>\n      <button id=\"nextBtn\">下一週 ▶<\u002Fbutton>\n      <button id=\"todayBtn\">回到今天<\u002Fbutton>\n      <button id=\"reloadBtn\">↻ 重新載入資料<\u002Fbutton>\n    <\u002Fdiv>\n    <span class=\"hint\">點日期標頭移動紅線；下方切面跟著更新<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"scroll\">\n    <div class=\"gantt\" id=\"gantt\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<div class=\"notes\">\n  <b>Google Sheet 欄位格式（第一列為標題列，順序不限，可有多餘欄位）：<\u002Fb><br>\n  ① <b>播出日期<\u002Fb>：YYYY/MM/DD，須為週五；墊檔集留空。② <b>類型<\u002Fb>：推薦／個人／墊檔（其他文字視同「推薦」）。③ <b>講者<\u002Fb>：這集上場的人，可多人（例：梅、熊）；閱讀與錄音會指派給講者。找不到「講者」欄時退回讀「選書人」欄。④ <b>作品<\u002Fb>：可留空＝已排檔期待選題，逾期會顯示 🚨。⑤ <b>錄音日期<\u002Fb>：任何集數皆可填，會顯示 🎙 圓點且切面以實際日期為準；晚於播出前四週會警示。⑥ <b>文案<\u002Fb>：撰寫文案的人。⑦ <b>剪輯<\u002Fb>：剪輯的人。⑧ <b>排程<\u002Fb>：可留空，預設阿植。⑨ <b>電子書<\u002Fb>：核取方塊——勾選（TRUE）顯示 📖 電子書標記；未勾選（FALSE）或空白不顯示。填文字（如平台名 BookWalker）也可以，會一併顯示。⑩ <b>完成追蹤欄<\u002Fb>：錄音安排完成日期（死線＝播出前 11 週；已填錄音日期欄視同完成）、錄音完成（前 4 週）、文案完成日期／剪輯完成日期（前 2 週）、排程完成日期（前 1 週）——<b>填入日期後，對應待辦的核取方塊會自動打勾並顯示完成日期（全隊一致，以 Sheet 為準）<\u002Fb>；留空且超過死線：節目未播出者顯示在頁面上方 🚨 進行中警戒，已過播出時間者沉到頁面最底的 🗂 紀錄區。⑪ <b>備註<\u002Fb>：自由填寫。<br>\n  <b>人名寫法<\u002Fb>：全名或簡稱皆可辨識（大酸梅／酸梅／梅、阿植／植、趴趴熊／熊、布菇／菇），多人用頓號或逗號分隔。<br>\n  <b>管線規則<\u002Fb>：選題（前 13–11 週）→ 閱讀（前 11–5 週）→ 錄音完成（前 4 週）→ 文案剪輯完成（前 2 週）→ 排程完成（前 1 週）。\n<\u002Fdiv>\n\n<!-- 🗂 頁面最底：已過播出時間的未完成紀錄 -->\n<div class=\"alertbox past\" id=\"alertPast\"><\u002Fdiv>\n\n<script>\n(function(){\n  /* ============================================================\n     設定區\n     ============================================================ */\n  const SHEET_CSV_URL = \"https://docs.google.com/spreadsheets/d/e/2PACX-1vTZwCjA_6nuu-pnlWabj2WXK2JxvOTnKIg9H2MylBYzE7UdV0pRormd7XpAK2sODc_wbp-YJVKcZhIr/pub?gid=1790075119&single=true&output=csv\";\n  const SEASON_START  = \"2026/07/06\"; // 甘特圖起算週的星期一\n  /* ============================================================ */\n\n  const PEOPLE = [\n    {name:\"布菇\",   aliases:[\"布菇\",\"菇\"],            color:\"var(--p-bugu)\", hex:\"#7C5CD6\"},\n    {name:\"阿植\",   aliases:[\"阿植\",\"植\"],            color:\"var(--p-azhi)\", hex:\"#1E9E6F\"},\n    {name:\"大酸梅\", aliases:[\"大酸梅\",\"酸梅\",\"梅\"],   color:\"var(--p-mei)\",  hex:\"#2F7FD6\"},\n    {name:\"趴趴熊\", aliases:[\"趴趴熊\",\"趴趴\",\"熊\"],   color:\"var(--p-papa)\", hex:\"#F08C00\"},\n  ];\n  const ALLNAMES = PEOPLE.map(p=>p.name);\n  const SUPERVISOR = \"布菇\";\n  const SCHEDULER = \"阿植\";\n  const personOf = n => PEOPLE.find(p=>p.name===n);\n  function matchPeople(str){\n    const s = String(str||\"\");\n    return PEOPLE.filter(p => p.aliases.some(a => s.includes(a))).map(p=>p.name);\n  }\n\n  const SAMPLE_CSV = `播出日期,類型,講者,作品,錄音日期,文案,剪輯,排程,備註\n2026/07/10,推薦,植,月之徑的行旅者,,,,,\n2026/07/17,推薦,植,人終將一死，不如先賣畫,,,,,\n2026/07/24,推薦,植,音盤紀行,,,,,\n2026/07/31,推薦,熊,藥命教師,,,,,\n2026/08/07,個人,熊,宅宅朝聖去 冰島 EP1,,,,,\n2026/08/14,個人,熊,宅宅朝聖去 冰島 EP2,,,,,\n2026/08/21,個人,熊,宅宅朝聖去 冰島 EP3,,,,,\n2026/08/28,個人,熊,宅宅朝聖去 冰島 EP4,,,,,\n2026/09/04,個人,熊,宅宅朝聖去 冰島 EP5,,,,,\n2026/09/11,個人,熊,宅宅朝聖去 冰島 EP6,,,,,\n2026/09/18,推薦,梅,燈神 未償之願,,,,,\n2026/09/25,推薦,植,魔女與傭兵,,,,,\n2026/10/02,推薦,植,別對映像研出手,,,,,\n2026/10/09,推薦,植,賽爾凡重生記,,,,,\n2026/10/16,推薦,,蟬法師 隱疾三僧徒的尋妻奇旅,,,,,\n2026/10/23,推薦,,神八小妹不可怕,,,,,\n2026/10/30,推薦,,天堂的天平,,,,,\n,墊檔,,墊檔 A（常青題待定）,2026/08/22,,,,剪完封存不排程\n,墊檔,,墊檔 B（常青題待定）,2026/08/22,,,,剪完封存不排程`;\n\n  const STAGES = [\n    {key:\"topic\", name:\"選題確認\", from:-13, to:-11},\n    {key:\"read\",  name:\"閱讀準備\", from:-11, to:-5},\n    {key:\"rec\",   name:\"錄音\",     from:-5,  to:-4},\n    {key:\"edit\",  name:\"文案剪輯\", from:-4,  to:-2},\n    {key:\"sched\", name:\"排程\",     from:-1,  to:-1},\n  ];\n  const NAMEOF = {topic:\"選題確認\",read:\"閱讀準備\",rec:\"錄音\",copy:\"文案撰寫\",edit:\"剪輯\",sched:\"排程\",stock:\"備用庫存\"};\n  const GENERIC = {\n    topic:\"敲定作品清單，並把錄音日訂進行事曆（填入 Sheet 錄音日期欄）\",\n    read:\"閱讀期進行中：新作、重溫、涉獵並行\",\n    rec:\"照錄音日計畫執行，可多錄墊檔\",\n    copy:\"撰寫本集文案\",\n    edit:\"剪輯進行中；⚠ 為完成死線那集，來不及就換墊檔或求救\",\n    sched:\"完成排程、上字、社群貼文\",\n    stock:\"庫存待命中，隨時可換上\",\n  };\n  const STAGECOLOR = {topic:\"--c-topic\",read:\"--c-read\",rec:\"--c-rec\",copy:\"--c-copy\",edit:\"--c-edit\",sched:\"--c-sched\",stock:\"--c-stock\"};\n\n  const COL_W = 44, LABEL_W = 250;\n  const DAY = 86400000;\n  const BROADCAST_MS = 3*3600*1000; // 台灣（UTC+8）週五 11:00 = UTC 03:00\n  const g = document.getElementById(\"gantt\");\n  const banner = document.getElementById(\"banner\");\n\n  function parseDateUTC(s){\n    const m = String(s||\"\").trim().match(/^(\\d{4})[\\/\\-](\\d{1,2})[\\/\\-](\\d{1,2})/);\n    if(!m) return null;\n    return Date.UTC(+m[1], +m[2]-1, +m[3]);\n  }\n  const seasonStart = parseDateUTC(SEASON_START);\n  const weekOf = ts => Math.floor((ts - seasonStart) / (7*DAY)) + 1;\n  function fridayLabel(w){\n    const d = new Date(seasonStart + (w-1)*7*DAY + 4*DAY);\n    return (d.getUTCMonth()+1) + \"/\" + d.getUTCDate();\n  }\n  const WD = [\"日\",\"一\",\"二\",\"三\",\"四\",\"五\",\"六\"];\n  function dateLabel(ts){\n    const d = new Date(ts);\n    return (d.getUTCMonth()+1) + \"/\" + d.getUTCDate() + \"（\" + WD[d.getUTCDay()] + \"）\";\n  }\n  function todayWeek(){\n    const n = new Date();\n    return weekOf(Date.UTC(n.getFullYear(), n.getMonth(), n.getDate()));\n  }\n  function todayTs(){\n    const n = new Date();\n    return Date.UTC(n.getFullYear(), n.getMonth(), n.getDate());\n  }\n  // 電子書（核取方塊）：TRUE=有電子書 → 顯示標記；FALSE／空白 → 不顯示\n  function ebookStatus(v){\n    const s = String(v||\"\").trim();\n    if(!s) return 0;\n    if(/^false$/i.test(s)) return 0;\n    if(/^(無|否|沒有|x|X|no|No|N)$/.test(s)) return 0;\n    return 1; // TRUE 或其他文字（如平台名）皆視為有\n  }\n  function ebookText(ep){\n    if(ebookStatus(ep.ebook) !== 1) return \"\";\n    const s = ep.ebook.trim();\n    if(/^(true|有|是|✓|v|V|yes|Yes|Y|o|O)$/i.test(s)) return \"📖 電子書\";\n    return \"📖 電子書（\" + s + \"）\";\n  }\n\n  function parseCSV(text){\n    const rows = [];\n    let row = [], cell = \"\", inQ = false;\n    for(let i=0; i<text.length; i++){\n      const c = text[i];\n      if(inQ){\n        if(c === '\"'){ if(text[i+1] === '\"'){ cell += '\"'; i++; } else inQ = false; }\n        else cell += c;\n      }else{\n        if(c === '\"') inQ = true;\n        else if(c === ','){ row.push(cell); cell = \"\"; }\n        else if(c === '\\n' || c === '\\r'){\n          if(c === '\\r' && text[i+1] === '\\n') i++;\n          row.push(cell); cell = \"\";\n          if(row.some(x => x.trim() !== \"\")) rows.push(row);\n          row = [];\n        }\n        else cell += c;\n      }\n    }\n    row.push(cell);\n    if(row.some(x => x.trim() !== \"\")) rows.push(row);\n    return rows;\n  }\n\n  function toEntries(csvText){\n    const rows = parseCSV(csvText);\n    if(rows.length < 2) return [];\n    const head = rows[0].map(h => h.trim());\n    // 先精準比對，再模糊比對；指派欄排除含「完成」的標題以免誤抓完成欄\n    const findCol = (...names) => {\n      for(const n of names){ const i = head.findIndex(h => h === n); if(i >= 0) return i; }\n      for(const n of names){ const i = head.findIndex(h => h.includes(n)); if(i >= 0) return i; }\n      return -1;\n    };\n    const findAssign = name => {\n      let i = head.findIndex(h => h === name);\n      if(i >= 0) return i;\n      return head.findIndex(h => h.includes(name) && !h.includes(\"完成\"));\n    };\n    const iDate = findCol(\"播出日期\"), iType = findCol(\"類型\"),\n          iSpk = findAssign(\"講者\"), iHost = findAssign(\"選書人\"),\n          iTitle = findCol(\"作品\"), iRec = findAssign(\"錄音日期\"),\n          iCopy = findAssign(\"文案\"), iEdit = findAssign(\"剪輯\"), iSch = findAssign(\"排程\"),\n          iEbook = findCol(\"電子書\"),\n          iRecArr = findCol(\"錄音安排完成日期\",\"錄音安排\"),\n          iRecDone = findCol(\"錄音完成日期\",\"錄音完成\"),\n          iCopyDone = findCol(\"文案完成日期\",\"文案完成\"),\n          iEditDone = findCol(\"剪輯完成日期\",\"剪輯完成\"),\n          iSchedDone = findCol(\"排程完成日期\",\"排程完成\"),\n          iNote = findCol(\"備註\");\n    return rows.slice(1).map(r=>{\n      const get = i => (i >= 0 && r[i] !== undefined) ? String(r[i]).trim() : \"\";\n      return {\n        airTs: parseDateUTC(get(iDate)),\n        type:  get(iType) || \"推薦\",\n        spk:   get(iSpk) || get(iHost),\n        title: get(iTitle),\n        recTs: parseDateUTC(get(iRec)) || parseDateUTC(get(iRecDone)),\n        copy:  get(iCopy),\n        edit:  get(iEdit),\n        sch:   get(iSch),\n        ebook: get(iEbook),\n        recArr:    get(iRecArr),\n        recDone:   get(iRecDone),\n        copyDone:  get(iCopyDone),\n        editDone:  get(iEditDone),\n        schedDone: get(iSchedDone),\n        note:  get(iNote),\n      };\n    }).filter(e => e.title || e.airTs);\n  }\n\n  let WEEKS = 24, TODAY_WEEK = 1, VIEW_FROM = 1, now = 1;\n  let team = [], solos = [], standbys = [];\n  let nl, tag, wkEls = [];\n\n  /* ── 本週待辦計算（供切面與四人看板共用）── */\n  function computeWeekItems(w){\n    const todos = [], infos = [];\n    team.forEach(ep=>{\n      const name = ep.title ? \"《\" + ep.title + \"》\" : fridayLabel(ep.air) + \" 集（作品未定）\";\n      const spkPeople = matchPeople(ep.spk);\n      if(ep.air === w) infos.push({group:\"air\", base:name + (spkPeople.length ? \"｜講者 \" + spkPeople.join(\"、\") : \"\")});\n\n      STAGES.forEach(s=>{\n        if(!(w >= ep.air + s.from && w <= ep.air + s.to)) return;\n        if(s.key === \"topic\"){\n          if(ep.title){ infos.push({group:\"topicDone\", base:name}); }\n          else{\n            todos.push({key:\"topic\", base:name + \"：定案作品\",\n              warn:(w === ep.air + s.to) ? \"⚠ 選題死線\" : null, people:ALLNAMES.slice()});\n          }\n          return;\n        }\n        if(s.key === \"read\"){\n          todos.push({key:\"read\", base:name, extra:ebookText(ep),\n            warn:(ebookStatus(ep.ebook) === -1) ? null : null,\n            people:spkPeople.length ? spkPeople : ALLNAMES.slice()});\n          return;\n        }\n        if(s.key === \"rec\"){\n          if(ep.recTs) return; // 已定錄音日：由實際日期驅動\n          todos.push({key:\"rec\", base:name,\n            warn:(w === ep.air + s.to) ? \"錄音完成死線\" : null,\n            done:ep.recDone,\n            people:spkPeople.length ? spkPeople : ALLNAMES.slice()});\n          return;\n        }\n        if(s.key === \"edit\"){\n          const warn = (w === ep.air + s.to) ? \"⚠ 剪輯死線\" : null;\n          todos.push({key:\"copy\", base:name + \"：文案\", warn:warn, done:ep.copyDone, people:matchPeople(ep.copy)});\n          todos.push({key:\"edit\", base:name + \"：剪輯\", warn:warn, done:ep.editDone, people:matchPeople(ep.edit)});\n          return;\n        }\n        if(s.key === \"sched\"){\n          const p = matchPeople(ep.sch);\n          todos.push({key:\"sched\", base:name, warn:null, done:ep.schedDone, people:p.length ? p : [SCHEDULER]});\n        }\n      });\n      if(ep.recTs && weekOf(ep.recTs) === w){\n        todos.push({key:\"rec\", base:name + \"（錄音日 \" + dateLabel(ep.recTs) + \"）\",\n          warn:(weekOf(ep.recTs) > ep.air - 4) ? \"⚠ 晚於錄音死線\" : null,\n          done:ep.recDone,\n          people:spkPeople.length ? spkPeople : ALLNAMES.slice()});\n      }\n    });\n    // 選題逾期\n    team.forEach(ep=>{\n      if(!ep.title && w > ep.air - 11 && w < ep.air){\n        todos.push({key:\"topic\", base:fridayLabel(ep.air) + \" 集：定案作品\",\n          warn:\"🚨 已逾期\", people:ALLNAMES.slice(), overdue:true});\n      }\n    });\n    solos.forEach(e=>{\n      if(e.air === w) infos.push({group:\"solo\", base:\"《\" + e.title + \"》\"});\n    });\n    standbys.forEach(sb=>{\n      (sb.stagesAbs||[]).forEach(s=>{\n        if(!(w >= s.from && w <= s.to)) return;\n        if(s.key === \"stock\"){ infos.push({group:\"stock\", base:\"《\" + sb.title + \"》\"}); return; }\n        if(s.key === \"rec\"){\n          todos.push({key:\"rec\", base:\"《\" + sb.title + \"》\" + (sb.recTs ? \"（錄音日 \" + dateLabel(sb.recTs) + \"）\" : \"\"),\n            warn:null, done:sb.recDone, people:matchPeople(sb.spk).length ? matchPeople(sb.spk) : ALLNAMES.slice()});\n          return;\n        }\n        if(s.key === \"edit\"){\n          const warn = (w === s.to) ? \"⚠ 剪輯死線\" : null;\n          todos.push({key:\"copy\", base:\"《\" + sb.title + \"》：文案\", warn:warn, done:sb.copyDone, people:matchPeople(sb.copy)});\n          todos.push({key:\"edit\", base:\"《\" + sb.title + \"》：剪輯\", warn:warn, done:sb.editDone, people:matchPeople(sb.edit)});\n        }\n      });\n    });\n    return {todos, infos};\n  }\n\n  /* ── 打勾狀態 ── */\n  const STORE_KEY = \"gantt_todo_v1\";\n  function loadTodos(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||\"{}\"); }catch(e){ return {}; } }\n  function saveTodos(o){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(o)); }catch(e){} }\n  const todoId = (w, it) => \"w\" + w + \"|\" + it.key + \"|\" + it.base;\n\n  function whoChips(it){\n    if(!it.people.length) return \" <span class='who un'>未指派<\u002Fspan>\";\n    return it.people.map(n=>{\n      const p = personOf(n);\n      return \" <span class='who' style='background:\" + p.hex + \"'>\" + n + \"<\u002Fspan>\";\n    }).join(\"\");\n  }\n\n  function doneLabel(v){\n    const ts = parseDateUTC(v);\n    return ts ? \"✓ \" + dateLabel(ts) + \" 完成\" : \"✓ 已完成\";\n  }\n\n  function makeTodoRow(w, it, showWho){\n    const lab = document.createElement(\"label\");\n    // Sheet 完成欄有值：自動打勾、鎖定、顯示完成日期（全隊一致）\n    if(it.done && String(it.done).trim() !== \"\"){\n      lab.className = \"todo checked donefix\";\n      lab.innerHTML = \"<input type='checkbox' checked disabled>\" +\n        \"<span class='txt'>\" + it.base +\n        (it.extra ? \" <span class='ebook'>\" + it.extra + \"<\u002Fspan>\" : \"\") +\n        \" <span class='donedate'>\" + doneLabel(it.done) + \"<\u002Fspan>\" +\n        (showWho ? whoChips(it) : \"\") + \"<\u002Fspan>\";\n      return lab;\n    }\n    const ticks = loadTodos();\n    const id = todoId(w, it);\n    lab.className = \"todo\" + (ticks[id] ? \" checked\" : \"\");\n    lab.innerHTML = \"<input type='checkbox'\" + (ticks[id] ? \" checked\" : \"\") + \">\" +\n      \"<span class='txt'>\" + it.base +\n      (it.extra ? \" <span class='ebook\" + (it.extra.indexOf(\"⚠\") === 0 ? \" paper\" : \"\") + \"'>\" + it.extra + \"<\u002Fspan>\" : \"\") +\n      (it.warn ? \" <em class='dl'>〈\" + it.warn + \"〉<\u002Fem>\" : \"\") +\n      (showWho ? whoChips(it) : \"\") + \"<\u002Fspan>\";\n    lab.querySelector(\"input\").addEventListener(\"change\", ev=>{\n      const t = loadTodos();\n      if(ev.target.checked) t[id] = 1; else delete t[id];\n      saveTodos(t);\n      refreshBoards();\n    });\n    return lab;\n  }\n\n  /* ── 🚨 頂端紅色警戒：完成欄位逾期未填 ── */\n  const CHECKS = [\n    {field:\"recArr\",    label:\"尚未安排錄音\", offWeeks:11},\n    {field:\"recDone\",   label:\"錄音\", offWeeks:4},\n    {field:\"copyDone\",  label:\"文案\", offWeeks:2},\n    {field:\"editDone\",  label:\"剪輯\", offWeeks:2},\n    {field:\"schedDone\", label:\"排程\", offWeeks:1},\n  ];\n  let activeAlerts = [];\n  function alertPeople(ep, field){\n    let p = [];\n    if(field === \"recArr\" || field === \"recDone\") p = matchPeople(ep.spk);\n    else if(field === \"copyDone\") p = matchPeople(ep.copy);\n    else if(field === \"editDone\") p = matchPeople(ep.edit);\n    else if(field === \"schedDone\"){ p = matchPeople(ep.sch); if(!p.length) p = [SCHEDULER]; }\n    return p.length ? p : [SUPERVISOR];\n  }\n  function renderAlerts(){\n    const top = document.getElementById(\"alertTop\");\n    const past = document.getElementById(\"alertPast\");\n    const badge = document.getElementById(\"alertBadge\");\n    const nowT = todayTs(), nowMs = Date.now();\n    const active = [], archived = [];\n    team.forEach(ep=>{\n      if(!ep.airTs) return;\n      const aired = (ep.airTs + BROADCAST_MS) <= nowMs; // 已過播出時間\n      CHECKS.forEach(c=>{\n        let done = String(ep[c.field]||\"\").trim() !== \"\";\n        if(c.field === \"recArr\" && ep.recTs) done = true; // 已填錄音日期＝已安排\n        if(done) return;\n        const deadline = ep.airTs - c.offWeeks*7*DAY;\n        if(nowT > deadline){\n          const daysOver = Math.round((nowT - deadline)/DAY);\n          (aired ? archived : active).push({ep, c, deadline, daysOver, people:alertPeople(ep, c.field)});\n        }\n      });\n    });\n    const line = it =>\n      \"<div class='aitem'>《\" + (it.ep.title || fridayLabel(it.ep.air) + \" 集・作品未定\") + \"》\" +\n      \"｜未完成部分：<b>\" + it.c.label + \"<\u002Fb>\" +\n      \"｜死線 \" + dateLabel(it.deadline) +\n      \"｜已超過 <b>\" + it.daysOver + \"<\u002Fb> 天（\" + fridayLabel(it.ep.air) + \" 播出）<\u002Fdiv>\";\n\n    if(active.length){\n      activeAlerts = active;\n      top.className = \"alertbox show\";\n      top.innerHTML = \"<b>🚨 未準時完成（進行中 \" + active.length + \" 項）——布菇請追蹤：<\u002Fb>\" +\n        active.map(line).join(\"\");\n      badge.className = \"alertbadge show\";\n      badge.textContent = \"🚨 \" + active.length + \" 項未準時完成\";\n    }else{\n      activeAlerts = [];\n      top.className = \"alertbox\"; top.innerHTML = \"\";\n      badge.className = \"alertbadge\"; badge.textContent = \"\";\n    }\n\n    if(archived.length){\n      past.className = \"alertbox past show\";\n      past.innerHTML = \"<b>🗂 已過播出時間・未在時限內完成的紀錄（\" + archived.length + \" 項，僅供回顧）<\u002Fb>\" +\n        archived.map(line).join(\"\");\n    }else{\n      past.className = \"alertbox past\"; past.innerHTML = \"\";\n    }\n  }\n\n  /* ── ① 接下來播出（台灣週五 11:00，秒級倒數）── */\n  let cdTimer = null;\n  function renderNextUp(){\n    const el = document.getElementById(\"nextup\");\n    const nowMs = Date.now();\n    const upcoming = [\n      ...team.map(e=>({...e, kind:\"team\"})),\n      ...solos.map(e=>({...e, kind:\"solo\"}))\n    ].filter(e => e.airTs && (e.airTs + BROADCAST_MS) > nowMs)\n     .sort((a,b)=> a.airTs - b.airTs);\n    if(cdTimer){ clearInterval(cdTimer); cdTimer = null; }\n    if(!upcoming.length){ el.innerHTML = \"<div class='big'><div class='title'>目前沒有已排定的播出<\u002Fdiv><\u002Fdiv>\"; return; }\n    const next = upcoming[0];\n    const later = upcoming.filter(e => e.airTs > next.airTs).slice(0,2);\n    const spk = matchPeople(next.spk);\n    el.innerHTML =\n      \"<div class='big'>\" +\n        \"<div class='kicker'>▶ 接下來播出 NEXT UP・週五 11:00（台灣）上架<\u002Fdiv>\" +\n        \"<div class='title'>\" + dateLabel(next.airTs) + \"《\" + (next.title||\"作品未定\") + \"》\" +\n          (next.kind===\"solo\" ? \"・個人節目\" : \"\") + \"<\u002Fdiv>\" +\n        \"<div class='meta'>\" + (spk.length ? \"講者：\" + spk.join(\"、\") : \"講者未定\") +\n          (next.note ? \"｜\" + next.note : \"\") + \"<\u002Fdiv>\" +\n      \"<\u002Fdiv>\" +\n      \"<div class='countdown mono' id='cdTimer'><small>距離上架<\u002Fsmall>--:--:--<\u002Fdiv>\" +\n      (later.length ?\n        \"<div class='after'><span class='kick'>再來<\u002Fspan><br>\" + later.map(e =>\n          \"<b>\" + fridayLabel(e.air) + \"<\u002Fb> <span class='work'>《\" + (e.title||\"未定\") + \"》<\u002Fspan>\").join(\"<br>\") + \"<\u002Fdiv>\"\n        : \"\");\n    const target = next.airTs + BROADCAST_MS;\n    const tick = ()=>{\n      const cdEl = document.getElementById(\"cdTimer\");\n      if(!cdEl){ clearInterval(cdTimer); cdTimer = null; return; }\n      const d = target - Date.now();\n      if(d <= 0){ clearInterval(cdTimer); cdTimer = null; renderNextUp(); return; }\n      const days = Math.floor(d/DAY);\n      const h = String(Math.floor(d%DAY/3600000)).padStart(2,\"0\");\n      const m = String(Math.floor(d%3600000/60000)).padStart(2,\"0\");\n      const s = String(Math.floor(d%60000/1000)).padStart(2,\"0\");\n      cdEl.innerHTML = \"<small>距離上架<\u002Fsmall>\" + (days>0 ? days + \" 天 \" : \"\") + h + \":\" + m + \":\" + s;\n    };\n    tick();\n    cdTimer = setInterval(tick, 1000);\n  }\n\n  /* ── ② 四人本週看板 ── */\n  function renderCrew(){\n    const w = TODAY_WEEK;\n    document.getElementById(\"crewTitle\").innerHTML =\n      \"🗓 本週四人看板 <span>週五 \" + fridayLabel(w) + \" 那一週｜各自的待辦<\u002Fspan>\";\n    const {todos} = computeWeekItems(w);\n    const crew = document.getElementById(\"crew\");\n    crew.innerHTML = \"\";\n    PEOPLE.forEach(p=>{\n      const card = document.createElement(\"div\");\n      card.className = \"person\";\n      card.style.borderTopColor = p.hex;\n      const role = p.name === SUPERVISOR ? \"時間軸監督\" :\n                   p.name === SCHEDULER ? \"排程負責\" : \"文案／剪輯／講者\";\n      card.innerHTML = \"<h3><span class='pd' style='background:\" + p.hex + \"'><\u002Fspan>\" +\n        p.name + \"<\u002Fh3><div class='role'>\" + role + \"<\u002Fdiv>\";\n\n      const late = activeAlerts.filter(a => a.people.includes(p.name));\n      late.forEach(a=>{\n        const d = document.createElement(\"div\");\n        d.className = \"lateitem\";\n        d.innerHTML = \"🚨 <b>\" + a.c.label + \"<\u002Fb>《\" +\n          (a.ep.title || fridayLabel(a.ep.air) + \" 集・作品未定\") + \"》已超過 \" +\n          a.daysOver + \" 天（死線 \" + dateLabel(a.deadline) + \"）\";\n        card.appendChild(d);\n      });\n\n      const mine = todos.filter(it => it.people.includes(p.name) &&\n        !(it.done && String(it.done).trim() !== \"\"));\n      if(mine.length){\n        mine.forEach(it=>{\n          const rowEl = makeTodoRow(w, it, false);\n          const chip = document.createElement(\"span\");\n          chip.className = \"stagechip\";\n          chip.style.background = getComputedStyle(document.documentElement)\n            .getPropertyValue(STAGECOLOR[it.key]).trim();\n          chip.textContent = NAMEOF[it.key];\n          rowEl.querySelector(\".txt\").prepend(chip);\n          card.appendChild(rowEl);\n        });\n      }else{\n        const n = document.createElement(\"div\");\n        n.className = \"none\";\n        n.textContent = \"本週沒有指派給你的項目 🎉\";\n        card.appendChild(n);\n      }\n\n      if(p.name === SUPERVISOR){\n        const watch = todos.filter(it =>\n          (it.warn || !it.people.length) && !it.people.includes(p.name));\n        if(watch.length){\n          const h = document.createElement(\"div\");\n          h.className = \"sup\";\n          h.textContent = \"👁 監督追蹤（死線／逾期／未指派）\";\n          card.appendChild(h);\n          watch.forEach(it=>{\n            const rowEl = makeTodoRow(w, it, true);\n            card.appendChild(rowEl);\n          });\n        }\n      }\n      crew.appendChild(card);\n    });\n  }\n\n  /* ── 甘特圖 ── */\n  function build(entries){\n    team = entries.filter(e => e.type !== \"個人\" && e.type !== \"墊檔\" && e.airTs)\n                  .map(e => ({...e, air: weekOf(e.airTs)}))\n                  .sort((a,b) => a.air - b.air);\n    solos = entries.filter(e => e.type === \"個人\" && e.airTs)\n                   .map(e => ({...e, air: weekOf(e.airTs)}))\n                   .sort((a,b) => a.air - b.air);\n    standbys = entries.filter(e => e.type === \"墊檔\")\n                      .map(e => ({...e, recW: e.recTs ? weekOf(e.recTs) : null}));\n\n    let maxW = 24;\n    team.forEach(e => maxW = Math.max(maxW, e.air + 1));\n    solos.forEach(e => maxW = Math.max(maxW, e.air + 1));\n    standbys.forEach(e => { if(e.recW) maxW = Math.max(maxW, e.recW + 6); });\n    WEEKS = maxW + 3;\n    TODAY_WEEK = Math.min(WEEKS, Math.max(1, todayWeek()));\n    VIEW_FROM = TODAY_WEEK; // 已過的週次不再顯示\n\n    g.innerHTML = \"\";\n    wkEls = [];\n    const nCols = WEEKS - VIEW_FROM + 1;\n    g.style.gridTemplateColumns = LABEL_W + \"px repeat(\" + nCols + \", \" + COL_W + \"px)\";\n    g.style.minWidth = (LABEL_W + nCols*COL_W + 20) + \"px\";\n    const colOf = w => w - VIEW_FROM + 2;\n\n    document.getElementById(\"rangeTitle\").textContent =\n      fridayLabel(VIEW_FROM) + \" → \" + fridayLabel(WEEKS) + \"，共 \" + nCols + \" 週（已過週次自動隱藏）\";\n\n    for(let w=VIEW_FROM; w<=WEEKS; w++){\n      const el = document.createElement(\"div\");\n      el.className = \"wk mono\";\n      el.style.gridColumn = colOf(w);\n      el.innerHTML = \"<b>\" + fridayLabel(w) + \"<\u002Fb>五\";\n      el.title = \"點我看這一週的切面\";\n      el.addEventListener(\"click\", ()=> setNow(w));\n      g.appendChild(el);\n      wkEls.push(el);\n    }\n    for(let w=VIEW_FROM+1; w<=WEEKS; w++){\n      const gl = document.createElement(\"div\");\n      gl.className = \"gridline\";\n      gl.style.left = (LABEL_W + (w-VIEW_FROM)*COL_W) + \"px\";\n      g.appendChild(gl);\n    }\n\n    let row = 2;\n\n    const visSolos = solos.filter(e => e.air >= VIEW_FROM && e.air <= WEEKS);\n    if(visSolos.length){\n      const minW = visSolos[0].air, maxWs = visSolos[visSolos.length-1].air;\n      const band = document.createElement(\"div\");\n      band.className = \"soloband\";\n      band.style.left = (LABEL_W + (minW-VIEW_FROM)*COL_W) + \"px\";\n      band.style.width = ((maxWs - minW + 1)*COL_W) + \"px\";\n      band.innerHTML = \"<em>個人節目 \" + fridayLabel(minW) + \"–\" + fridayLabel(maxWs) + \"<\u002Fem>\";\n      g.appendChild(band);\n\n      const label = document.createElement(\"div\");\n      label.className = \"eplabel\";\n      label.style.gridRow = row;\n      label.style.color = \"var(--c-solo)\";\n      label.innerHTML = \"個人節目<small>共 \" + visSolos.length + \" 集<\u002Fsmall>\";\n      g.appendChild(label);\n      visSolos.forEach(e=>{\n        const d = document.createElement(\"div\");\n        d.className = \"air solo\";\n        d.style.gridRow = row;\n        d.style.gridColumn = colOf(e.air);\n        d.title = fridayLabel(e.air) + \"《\" + e.title + \"》\" + (e.note ? \"｜\" + e.note : \"\");\n        g.appendChild(d);\n      });\n      row++;\n    }\n\n    const addBar = (r, key, from, to, tip, done) => {\n      const f = Math.max(VIEW_FROM, from), t = Math.min(WEEKS, to);\n      if(to < VIEW_FROM || f > WEEKS || f > t) return;\n      const bar = document.createElement(\"div\");\n      bar.className = \"bar \" + key + (key===\"rec\" ? \" rec\" : \"\") + (done ? \" done\" : \"\");\n      bar.style.gridRow = r;\n      bar.style.gridColumn = colOf(f) + \" / \" + (colOf(t)+1);\n      if(key !== \"stock\") bar.style.background = \"var(--c-\" + key + \")\";\n      bar.title = tip + \"｜\" + NAMEOF[key] + (done ? \"（已完成）\" : \"\") +\n        \"（\" + fridayLabel(f) + \" 那週 – \" + fridayLabel(t) + \" 那週）\";\n      g.appendChild(bar);\n    };\n\n    team.forEach(ep=>{\n      if(ep.air < VIEW_FROM) return; // 已播出的集數不再顯示\n      const label = document.createElement(\"div\");\n      label.className = \"eplabel\";\n      label.style.gridRow = row;\n      const spkPeople = matchPeople(ep.spk);\n      const parts = [];\n      if(spkPeople.length) parts.push(\"講 <span class='host'>\" + spkPeople.join(\"、\") + \"<\u002Fspan>\");\n      const copyP = matchPeople(ep.copy);\n      if(copyP.length) parts.push(\"文 <span class='t-copy'>\" + copyP.join(\"、\") + \"<\u002Fspan>\");\n      const editP = matchPeople(ep.edit);\n      if(editP.length) parts.push(\"剪 <span class='t-edit'>\" + editP.join(\"、\") + \"<\u002Fspan>\");\n      const schP = matchPeople(ep.sch);\n      if(schP.length) parts.push(\"程 <span class='t-sched'>\" + schP.join(\"、\") + \"<\u002Fspan>\");\n      const eb = ebookText(ep);\n      if(eb) parts.push(\"<span class='\" + (ebookStatus(ep.ebook) === 1 ? \"t-eb\" : \"t-paper\") + \"'>\" + eb + \"<\u002Fspan>\");\n      const sub = ep.title\n        ? \"《\" + ep.title + \"》\" + (parts.length ? \"・\" + parts.join(\"｜\") : \"\")\n        : \"作品未定・待選題\";\n      label.innerHTML = fridayLabel(ep.air) + \" 集<small>\" + sub + \"<\u002Fsmall>\";\n      if(!ep.title){ label.style.opacity = .6; }\n      label.title = \"《\" + (ep.title||\"未定\") + \"》\" +\n        (spkPeople.length ? \"｜講者：\" + spkPeople.join(\"、\") : \"\") +\n        (copyP.length ? \"｜文案：\" + copyP.join(\"、\") : \"\") +\n        (editP.length ? \"｜剪輯：\" + editP.join(\"、\") : \"\") +\n        (schP.length ? \"｜排程：\" + schP.join(\"、\") : \"\") +\n        (eb ? \"｜\" + eb : \"\") +\n        (ep.note ? \"｜\" + ep.note : \"\");\n      g.appendChild(label);\n      const epName = fridayLabel(ep.air) + \" 集\" + (ep.title ? \"《\" + ep.title + \"》\" : \"（作品未定）\");\n      STAGES.forEach(s=> addBar(row, s.key, ep.air + s.from, ep.air + s.to, epName, s.key===\"topic\" && !!ep.title));\n      if(ep.air >= VIEW_FROM && ep.air <= WEEKS){\n        const d = document.createElement(\"div\");\n        d.className = \"air\";\n        d.style.gridRow = row;\n        d.style.gridColumn = colOf(ep.air);\n        d.title = fridayLabel(ep.air) + \" 播出\";\n        g.appendChild(d);\n      }\n      if(ep.recTs){\n        const rw = weekOf(ep.recTs);\n        if(rw >= VIEW_FROM && rw <= WEEKS){\n          const late = rw > ep.air - 4;\n          const m = document.createElement(\"div\");\n          m.className = \"recdot\" + (late ? \" late\" : \"\");\n          m.style.gridRow = row;\n          m.style.gridColumn = colOf(rw);\n          m.title = epName + \"｜錄音日 \" + dateLabel(ep.recTs) +\n            (late ? \"（⚠ 晚於錄音完成死線）\" : \"\");\n          g.appendChild(m);\n        }\n      }\n      row++;\n    });\n\n    standbys.forEach(sb=>{\n      const label = document.createElement(\"div\");\n      label.className = \"eplabel\";\n      label.style.gridRow = row;\n      label.style.color = \"var(--c-stock)\";\n      label.innerHTML = \"《\" + sb.title + \"》<small>墊檔・無播出日<\u002Fsmall>\";\n      label.title = sb.note || \"\";\n      g.appendChild(label);\n      if(sb.recW){\n        sb.stagesAbs = [\n          {key:\"rec\",   from:sb.recW,   to:sb.recW},\n          {key:\"edit\",  from:sb.recW+1, to:sb.recW+3},\n          {key:\"stock\", from:sb.recW+4, to:WEEKS},\n        ];\n      }else{\n        sb.stagesAbs = [{key:\"stock\", from:1, to:WEEKS}];\n      }\n      sb.stagesAbs.forEach(s=> addBar(row, s.key, s.from, s.to, \"《\" + sb.title + \"》\", false));\n      if(sb.recW && sb.recW >= VIEW_FROM && sb.recW <= WEEKS){\n        const m = document.createElement(\"div\");\n        m.className = \"recdot\";\n        m.style.gridRow = row;\n        m.style.gridColumn = colOf(sb.recW);\n        m.title = \"《\" + sb.title + \"》｜錄音日 \" + dateLabel(sb.recTs);\n        g.appendChild(m);\n      }\n      row++;\n    });\n\n    nl = document.createElement(\"div\");\n    nl.className = \"nowline\";\n    g.appendChild(nl);\n    tag = document.createElement(\"div\");\n    tag.className = \"nowtag mono\";\n    g.appendChild(tag);\n\n    renderNextUp();\n    renderAlerts();\n    renderCrew();\n    setNow(TODAY_WEEK);\n  }\n\n  // 每小時重新以當下真實日期檢測（跨日、跨週五自動更新）\n  setInterval(()=>{\n    TODAY_WEEK = Math.min(WEEKS, Math.max(1, todayWeek()));\n    renderNextUp();\n    renderAlerts();\n    renderCrew();\n  }, 60*60*1000);\n\n  /* ── ⑤ 週次瀏覽切面 ── */\n  const slice = document.getElementById(\"slice\");\n  const sliceTitle = document.getElementById(\"sliceTitle\");\n\n  function updateProgress(){\n    const boxes = slice.querySelectorAll(\"input[type=checkbox]\");\n    const done = slice.querySelectorAll(\"input[type=checkbox]:checked\");\n    const el = document.getElementById(\"progress\");\n    el.textContent = boxes.length ? (\"✅ 本週進度 \" + done.length + \" / \" + boxes.length) : \"\";\n  }\n\n  function renderSlice(){\n    slice.innerHTML = \"\";\n    const {todos, infos} = computeWeekItems(now);\n    const byKey = {};\n    todos.forEach(it => { (byKey[it.key] = byKey[it.key] || []).push(it); });\n\n    const makeCard = (title, desc, colorVar, fill) => {\n      const t = document.createElement(\"div\");\n      t.className = \"task\";\n      t.style.borderLeftColor = getComputedStyle(document.documentElement)\n        .getPropertyValue(colorVar).trim();\n      t.innerHTML = \"<b>\" + title + \"<\u002Fb>\" + (desc ? \"<span>\" + desc + \"<\u002Fspan>\" : \"\");\n      fill(t);\n      slice.appendChild(t);\n    };\n\n    let any = false;\n    const overdueItems = todos.filter(it => it.overdue);\n    if(overdueItems.length){\n      any = true;\n      makeCard(\"🚨 選題逾期\", \"本週最優先：立刻定案，或改排輕量集／啟用墊檔\", \"--c-rec\", t=>{\n        overdueItems.forEach(it => t.appendChild(makeTodoRow(now, it, true)));\n      });\n    }\n    const ORDER = [\"sched\",\"copy\",\"edit\",\"rec\",\"read\",\"topic\"];\n    ORDER.forEach(key=>{\n      const items = (byKey[key]||[]).filter(it => !it.overdue);\n      if(!items.length) return;\n      any = true;\n      makeCard(NAMEOF[key], GENERIC[key], STAGECOLOR[key], t=>{\n        items.forEach(it => t.appendChild(makeTodoRow(now, it, true)));\n      });\n    });\n\n    const infoGroups = [\n      {g:\"air\",       title:\"🎉 本週五播出\", desc:\"排程應已於上週完成\", color:\"--c-air\"},\n      {g:\"solo\",      title:\"◆ 個人節目播出\", desc:fridayLabel(now) + \" 週五上架\", color:\"--c-solo\"},\n      {g:\"topicDone\", title:\"✓ 選題窗口（作品已定）\", desc:\"已超前，無需動作\", color:\"--c-topic\"},\n      {g:\"stock\",     title:\"備用庫存\", desc:\"待命中，隨時可換上\", color:\"--c-stock\"},\n    ];\n    infoGroups.forEach(grp=>{\n      const items = infos.filter(i => i.group === grp.g);\n      if(!items.length) return;\n      any = true;\n      makeCard(grp.title, grp.desc, grp.color, t=>{\n        items.forEach(i=>{\n          const p = document.createElement(\"div\");\n          p.className = \"todo info\";\n          p.innerHTML = \"<span>\" + i.base + \"<\u002Fspan>\";\n          t.appendChild(p);\n        });\n      });\n    });\n\n    if(!any){\n      const e = document.createElement(\"div\");\n      e.className = \"empty\";\n      e.textContent = \"這一週沒有排定的管線工作。\";\n      slice.appendChild(e);\n    }\n    updateProgress();\n  }\n\n  function refreshBoards(){\n    renderCrew();\n    renderSlice();\n  }\n\n  function setNow(w){\n    now = Math.min(WEEKS, Math.max(VIEW_FROM, w));\n    const x = LABEL_W + (now-VIEW_FROM)*COL_W + COL_W/2;\n    nl.style.left = x + \"px\";\n    tag.style.left = x + \"px\";\n    tag.textContent = (now === TODAY_WEEK ? \"本週 \" : \"週五 \") + fridayLabel(now);\n    wkEls.forEach((el,i)=> el.classList.toggle(\"active\", VIEW_FROM + i === now));\n    sliceTitle.textContent = \"🔴 切面：週五 \" + fridayLabel(now) + \" 那一週\" +\n      (now === TODAY_WEEK ? \"（本週）\" : now === TODAY_WEEK+1 ? \"（下週）\" : \"\");\n    document.getElementById(\"curLabel\").textContent = \"W\" + now + \" · \" + fridayLabel(now);\n    document.getElementById(\"prevBtn\").disabled = (now === VIEW_FROM);\n    document.getElementById(\"nextBtn\").disabled = (now === WEEKS);\n    renderSlice();\n  }\n\n  document.getElementById(\"prevBtn\").addEventListener(\"click\", ()=> setNow(now-1));\n  document.getElementById(\"nextBtn\").addEventListener(\"click\", ()=> setNow(now+1));\n  document.getElementById(\"todayBtn\").addEventListener(\"click\", ()=> setNow(TODAY_WEEK));\n  document.getElementById(\"reloadBtn\").addEventListener(\"click\", load);\n\n  async function load(){\n    if(!SHEET_CSV_URL){\n      banner.className = \"banner show\";\n      banner.innerHTML = \"⚙️ 目前顯示的是<b>內建示範資料<\u002Fb>。請在檔案開頭的 <code>SHEET_CSV_URL<\u002Fcode> 填入 Google Sheet 發布的 CSV 網址。\";\n      build(toEntries(SAMPLE_CSV));\n      return;\n    }\n    try{\n      const res = await fetch(SHEET_CSV_URL + (SHEET_CSV_URL.includes(\"?\") ? \"&\" : \"?\") + \"t=\" + Date.now());\n      if(!res.ok) throw new Error(\"HTTP \" + res.status);\n      const text = await res.text();\n      const entries = toEntries(text);\n      if(!entries.length) throw new Error(\"資料為空或欄位名稱不符\");\n      banner.className = \"banner\";\n      build(entries);\n    }catch(err){\n      banner.className = \"banner show\";\n      banner.innerHTML = \"⚠️ 無法載入 Google Sheet（\" + err.message + \"），暫以內建示範資料顯示。請確認 Sheet 已「發布到網路」且格式為 CSV。\";\n      build(toEntries(SAMPLE_CSV));\n    }\n  }\n\n  load();\n})();\n<\u002Fscript>\n\n<!-- 品牌頁尾 -->\n<footer class=\"brandfoot\">\n  <img src=\"de7d079e-49cc-4f79-a96d-b69e273362e4\" class=\"sloganimg\" alt=\"當宅宅進入 OFF 模式，必會打開某個 ON 開關\">\n  <div class=\"footrow\">\n    <img src=\"4ae78108-3e8a-4981-bf52-d632f3968e99\" class=\"doorimg\" alt=\"下班出門\">\n    <div class=\"foottext\">\n      <img src=\"4322521d-60f6-4170-bc45-4591eb8880bb\" class=\"footlogo\" alt=\"宅宅下班中\">\n      <p>宅宅下班中 · 節目製作看板<br><span>Otaku After Work — Production Board<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <img src=\"ef20e23e-3861-47fe-988e-06c243ed07a0\" class=\"footzhai\" alt=\"宅\">\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
